name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn --batch-mode clean test

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        run: surge ./target/roq ${{ env.PREVIEW_URL }} --token ${{ secrets.SURGE_TOKEN }}
        env:
          PREVIEW_URL: pr-${{ github.event.number }}-wildfly-org.surge.sh

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `https://pr-${{ github.event.number }}-wildfly-org.surge.sh`;
            const body = `A preview of this PR is available at ${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('A preview of this PR is available at')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  teardown-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Install Surge
        run: npm install -g surge

      - name: Teardown preview
        run: surge teardown pr-${{ github.event.number }}-wildfly-org.surge.sh --token ${{ secrets.SURGE_TOKEN }}
